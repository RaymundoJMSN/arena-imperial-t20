name: Build Release (Tauri)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - name: Patch time crate (fix compatibilidade Rust moderno)
        run: cargo update --manifest-path src-tauri/Cargo.toml -p time --precise 0.3.36

      - name: Build and release Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: Arena Imperial T20 ${{ github.ref_name }}
          releaseBody: |
            ## Arena Imperial T20 ${{ github.ref_name }}

            Gerador de encontros para Tormenta 20.

            ### Instalação Windows
            Baixe o arquivo `.msi` ou `.exe` abaixo e execute.

            ### Atualização automática
            Se você já tem o app instalado, ele irá notificar automaticamente quando esta versão estiver disponível.

            ### Também disponível como site
            https://arena.raynathus.com.br
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: true
